<!DOCTYPE html>

    <style>
        :root {
            --primary: #2563eb;
            --secondary: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --background: #f0fdf4;
            --text: #1f2937;
        }

        * {
            box-sizing: border-box;
            font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Header Stats */
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .streak { color: var(--secondary); }
        .score { color: var(--primary); }

        /* Screens */
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            background: white;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            color: var(--text);
        }

        .btn:hover {
            border-color: var(--primary);
            background: #eff6ff;
            transform: translateY(-2px);
        }

        .btn.correct {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .btn.wrong {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        /* Category Grid */
        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .cat-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px 10px;
        }
        .cat-btn:hover { background: #1d4ed8; color: white;}

        /* Timer */
        .timer-bar {
            width: 100%;
            height: 10px;
            background: #e5e7eb;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: var(--secondary);
            width: 100%;
            transition: width 1s linear;
        }

        h1 { margin-top: 0; color: var(--primary); }
        h2.question-word { font-size: 2em; margin: 20px 0; color: #111827; }
    </style>
    <!-- แนะนำให้ใช้ Font ไทยเพื่อความสวยงาม -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
</head>

                { en: "8D Report", th: "รายงาน 8 มิติ" },
                { en: "First Article Inspection (FAI)", th: "การตรวจชิ้นแรก" },

                { en: "Incoming Inspection", th: "การตรวจรับวัตถุดิบ" },
                { en: "Final Inspection", th: "การตรวจขั้นสุดท้าย" },
                { en: "Sampling", th: "การสุ่มตัวอย่าง" },

                { en: "Continuous Improvement", th: "การปรับปรุงอย่างต่อเนื่อง" }
            ]
        },
        warehouse: {
            name: "📦 คลังสินค้า (Warehouse)",
            words: [
                { en: "Warehouse", th: "คลังสินค้า" },
                { en: "Inventory", th: "สินค้าคงคลัง" },
                { en: "Stock", th: "สินค้า / สต็อก" },
                { en: "SKU (Stock Keeping Unit)", th: "รหัสสินค้า" },
                { en: "Item", th: "รายการสินค้า" },
                { en: "Material", th: "วัสดุ/วัตถุดิบ" },
                { en: "Product", th: "สินค้า/ผลิตภัณฑ์" },
                { en: "Receipt", th: "การรับสินค้า" },
                { en: "Receiving", th: "การรับเข้า" },
                { en: "GRN (Goods Received Note)", th: "ใบรับสินค้า" },
                { en: "Put-away", th: "การนำสินค้าเข้าจัดเก็บ" },
                { en: "Storage", th: "การจัดเก็บ" },
                { en: "Location", th: "ตำแหน่งจัดเก็บ" },
                { en: "Bin / Bin Location", th: "ช่องเก็บสินค้า" },
                { en: "Shelf", th: "ชั้นวางสินค้า" },
                { en: "Rack", th: "ชั้นวาง/แร็ค" },
                { en: "Pallet", th: "พาเลท/แท่นวางสินค้า" },
                { en: "Palletizing", th: "การจัดสินค้าขึ้นพาเลท" },
                { en: "AS/RS", th: "ระบบจัดเก็บและเบิกจ่ายสินค้าอัตโนมัติ" },
                { en: "FIFO (First In First Out)", th: "เข้าก่อน-ออกก่อน" },
                { en: "LIFO (Last In First Out)", th: "เข้าหลัง-ออกก่อน" },
                { en: "FEFO (First Expire First Out)", th: "ใกล้หมดอายุก่อน-ออกก่อน" },
                { en: "Cycle Count", th: "การนับสต็อกเป็นรอบ" },
                { en: "Stock Count", th: "การนับสต็อก" },
                { en: "Stock Card", th: "บัตรคุมสต็อก" },
                { en: "Picking", th: "การหยิบสินค้า" },
                { en: "Pick List", th: "ใบหยิบสินค้า" },
                { en: "Packing", th: "การบรรจุสินค้า" },
                { en: "Pack List", th: "ใบรายการบรรจุ" },
                { en: "Shipping", th: "การจัดส่งสินค้า" },
                { en: "Delivery Order (DO)", th: "ใบส่งสินค้า" },

                { en: "Unloading", th: "การขนถ่ายสินค้า" },
                { en: "QC (Quality Control)", th: "การควบคุมคุณภาพ" },
                { en: "Inspection", th: "การตรวจสอบ" },
                { en: "Damage", th: "สินค้าเสียหาย" },
                { en: "Shortage", th: "สินค้าขาด" },
                { en: "Expired", th: "สินค้าหมดอายุ" },
                { en: "Return", th: "การส่งคืนสินค้า" },
                { en: "Back Order", th: "การสั่งซื้อสินค้าล่วงหน้า" },
                { en: "Reorder Point", th: "จุดสั่งซื้อใหม่" },
                { en: "Safety Stock", th: "สต็อกสำรอง" },
                { en: "Lead Time", th: "ระยะเวลานำ" },
                { en: "WMS", th: "ระบบบริหารจัดการคลังสินค้า" },
                { en: "Bar Code", th: "บาร์โค้ด" },
                { en: "RFID", th: "ระบบระบุด้วยคลื่นวิทยุ" },
                { en: "Physical Inventory", th: "การตรวจนับสต็อกจริง" },
                { en: "Housekeeping", th: "การทำความสะอาดและจัดระเบียบ" },
                { en: "5S", th: "สะสาง สะดวก สะอาด สุขลักษณะ สร้างนิสัย" }
            ]
        }
    };

    // ตัวแปรควบคุมเกม
    let currentCategory = '';
    let currentWords = [];
    let score = 0;
    let currentQuestionIndex = 0;
    let timerInterval;
    let timeLeft = 60; // ให้เวลา 60 วินาทีต่อรอบ

    // ระบบ Streak (เข้าเล่นต่อเนื่อง)
    function checkStreak() {
        const lastPlayed = localStorage.getItem('lastPlayed');
        let streak = parseInt(localStorage.getItem('streak') || 0);
        const today = new Date().toDateString();

        if (lastPlayed) {
            const lastDate = new Date(lastPlayed);
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);

            if (lastPlayed !== today) {
                if (lastDate.toDateString() === yesterday.toDateString()) {
                    streak++; // เล่นต่อเนื่อง
                } else {
                    streak = 1; // ขาดตอน เริ่มใหม่
                }
            }
        } else {
            streak = 1; // เล่นครั้งแรก
        }

        localStorage.setItem('lastPlayed', today);
        localStorage.setItem('streak', streak);
        document.getElementById('streak-count').innerText = streak;
    }

    // ฟังก์ชันจัดการหน้าจอ
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-${screenId}`).classList.add('active');
    }

    // สร้างปุ่มเลือกหมวดหมู่ตอนเริ่มเกม
    function initHome() {
        checkStreak();
        const container = document.getElementById('category-container');
        container.innerHTML = '';
        for (const [key, data] of Object.entries(vocabDatabase)) {
            const btn = document.createElement('button');
            btn.className = 'btn cat-btn';
            btn.innerText = data.name;
            btn.onclick = () => startGame(key);
            container.appendChild(btn);
        }
    }

    // สุ่ม Array
    function shuffleArray(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    // เริ่มเกม
    function startGame(categoryKey) {
        currentCategory = categoryKey;
        currentWords = shuffleArray([...vocabDatabase[categoryKey].words]);
        score = 0;
        currentQuestionIndex = 0;
        timeLeft = 60;
        
        document.getElementById('score-count').innerText = score;
        document.getElementById('current-category-title').innerText = vocabDatabase[categoryKey].name;
        
        showScreen('game');
        startTimer();
        loadNextQuestion();
    }

    // ระบบเวลา
    function startTimer() {
        const timerFill = document.getElementById('timer');
        clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            timeLeft--;
            const percentage = (timeLeft / 60) * 100;
            timerFill.style.width = `${percentage}%`;
            
            if (percentage < 30) timerFill.style.background = 'var(--danger)';
            else timerFill.style.background = 'var(--secondary)';

            if (timeLeft <= 0) {
                endGame();
            }
        }, 1000);
    }

    // โหลดคำถามถัดไป
    function loadNextQuestion() {
        if (currentQuestionIndex >= currentWords.length) {
            // ถ้าระหว่างเล่นคำศัพท์หมด ให้สุ่มคำศัพท์ชุดเดิมมาเล่นต่อจนกว่าเวลาจะหมด
            currentWords = shuffleArray([...vocabDatabase[currentCategory].words]);
            currentQuestionIndex = 0;
        }

        const currentWordObj = currentWords[currentQuestionIndex];
        document.getElementById('question').innerText = currentWordObj.en;

        // สร้างตัวเลือก (1 ถูก + 3 ผิด)
        let options = [currentWordObj.th];
        
        // หาคำแปลผิดจากหมวดเดียวกันมาหลอก
        const allThWords = vocabDatabase[currentCategory].words.map(w => w.th);
        const wrongOptions = shuffleArray(allThWords.filter(th => th !== currentWordObj.th)).slice(0, 3);
        
        options = shuffleArray([...options, ...wrongOptions]);

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, currentWordObj.th);
            optionsContainer.appendChild(btn);
        });
    }

    // ตรวจคำตอบ
    function checkAnswer(btn, selected, correct) {
        // ปิดปุ่มทั้งหมดกันกดซ้ำ
        const allBtns = document.getElementById('options-container').querySelectorAll('.btn');
        allBtns.forEach(b => b.style.pointerEvents = 'none');

        if (selected === correct) {
            btn.classList.add('correct');
            score += 10;
            document.getElementById('score-count').innerText = score;
            
            // เพิ่มเวลาโบนัส 2 วินาที
            timeLeft = Math.min(timeLeft + 2, 60); 
        } else {
            btn.classList.add('wrong');
            // ไฮไลท์ข้อที่ถูกให้ดูด้วย
            allBtns.forEach(b => {
                if(b.innerText === correct) b.classList.add('correct');
            });
        }

        setTimeout(() => {
            currentQuestionIndex++;
            loadNextQuestion();
        }, 1000); // รอ 1 วินาทีแล้วไปข้อต่อไป
    }

    // จบเกม
    function endGame() {
        clearInterval(timerInterval);
        document.getElementById('final-score').innerText = score;
        
        const msg = document.getElementById('result-message');
        if(score > 100) msg.innerText = "สุดยอด! คุณคือผู้เชี่ยวชาญคำศัพท์โรงงาน 🏆";
        else if(score > 50) msg.innerText = "เก่งมาก! ฝึกอีกนิดจะจำได้แม่นยำขึ้น 👍";
        else msg.innerText = "พยายามได้ดี! พรุ่งนี้มาทบทวนกันใหม่นะ 💪";

        showScreen('result');
    }

    // เริ่มต้นทำงาน
    window.onload = initHome;

</script>
